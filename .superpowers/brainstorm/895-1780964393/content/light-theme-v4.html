<h2>HOME · Light Theme v4</h2>
<p class="subtitle">Íconos sólidos — sin espacios en blanco</p>

<style>
  * { box-sizing: border-box; }
  .light-home {
    background: #f8fafc;
    border: 2px solid #d1d5db;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    max-width: 700px;
    margin: 20px auto;
    min-height: 360px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .l-sidebar {
    width: 64px;
    background: #ffffff;
    border-right: 2px solid #d1d5db;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 6px;
    flex-shrink: 0;
  }
  .l-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .l-icon svg { width: 22px; height: 22px; }
  .l-icon.logo { background: linear-gradient(135deg, #84cc16, #3f6212); border: 2px solid #4d7c0f; }
  .l-icon.active { background: #dcfce7; border: 2px solid #86efac; }
  .l-icon.inactive { border: 2px solid transparent; }
  .l-icon.theme-btn { background: #f3f4f6; border: 2px solid #d1d5db; border-radius: 50%; margin-top: auto; }
  .l-content { flex: 1; padding: 16px; background: #f8fafc; }
  .l-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .l-stat { background: #fff; border: 2px solid #d1d5db; border-radius: 14px; padding: 14px 8px; text-align: center; }
  .l-stat-val { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
  .l-stat-lbl { color: #9ca3af; font-size: 11px; font-weight: 500; }
  .l-stat-flame { display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
  .l-section-lbl { color: #6b7280; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
  .l-room { border-radius: 14px; padding: 13px 14px; margin-bottom: 9px; display: flex; align-items: center; justify-content: space-between; border: 2px solid; }
  .l-room.highlighted { background: #f0fdf4; border-color: #4ade80; }
  .l-room.plain { background: #ffffff; border-color: #d1d5db; }
  .l-room-left { display: flex; align-items: center; gap: 11px; }
  .l-room-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid; }
  .l-room-icon svg { width: 22px; height: 22px; }
  .l-room.highlighted .l-room-icon { background: #dcfce7; border-color: #86efac; }
  .l-room.plain .l-room-icon { background: #f3f4f6; border-color: #d1d5db; }
  .l-room-name { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 2px; }
  .l-room-sub { font-size: 11px; color: #9ca3af; }
  .l-room-rank { font-size: 16px; font-weight: 800; text-align: right; margin-bottom: 1px; }
  .l-room.highlighted .l-room-rank { color: #16a34a; }
  .l-room.plain .l-room-rank { color: #6b7280; }
  .l-room-pts { font-size: 11px; color: #9ca3af; text-align: right; }
  .l-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .l-btn { border-radius: 12px; padding: 13px 10px; font-size: 13px; font-weight: 700; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; border: 2px solid; }
  .l-btn svg { width: 18px; height: 18px; }
  .l-btn-primary { background: #65a30d; color: #000; border-color: #4d7c0f; }
  .l-btn-outline { background: #fff; color: #16a34a; border-color: #4ade80; }
</style>
