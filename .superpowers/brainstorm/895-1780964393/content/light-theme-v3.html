<h2>HOME · Light Theme v3</h2>
<p class="subtitle">Bordes gruesos · íconos explícitos y grandes</p>

<style>
  * { box-sizing: border-box; }
  .light-home {
    background: #f8fafc;
    border: 2px solid #d1d5db;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    max-width: 700px;
    margin: 20px auto;
    min-height: 360px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  /* Sidebar */
  .l-sidebar {
    width: 64px;
    background: #ffffff;
    border-right: 2px solid #d1d5db;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 6px;
    flex-shrink: 0;
  }
  .l-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .l-icon svg { width: 22px; height: 22px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .l-icon.active { background: #dcfce7; border: 2px solid #86efac; }
  .l-icon.active svg { stroke: #16a34a; stroke-width: 2.5; }
  .l-icon.inactive svg { stroke: #6b7280; stroke-width: 2.2; }
  .l-icon.logo { background: linear-gradient(135deg, #84cc16, #3f6212); border: 2px solid #4d7c0f; }
  .l-icon.logo svg { stroke: white; stroke-width: 2.2; }
  .l-icon.theme-btn { background: #f3f4f6; border: 2px solid #d1d5db; border-radius: 50%; }
  .l-icon.theme-btn svg { stroke: #6b7280; stroke-width: 2.2; }

  /* Content */
  .l-content { flex: 1; padding: 16px; background: #f8fafc; }

  /* Stats */
  .l-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .l-stat {
    background: #ffffff;
    border: 2px solid #d1d5db;
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
  }
  .l-stat-val { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
  .l-stat-lbl { color: #9ca3af; font-size: 11px; font-weight: 500; }
  .l-stat-icon { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .l-stat svg { width: 26px; height: 26px; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* Section label */
  .l-section-lbl { color: #6b7280; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }

  /* Room cards */
  .l-room {
    border-radius: 14px;
    padding: 13px 14px;
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 2px solid;
  }
  .l-room.highlighted { background: #f0fdf4; border-color: #4ade80; }
  .l-room.plain { background: #ffffff; border-color: #d1d5db; }
  .l-room-left { display: flex; align-items: center; gap: 11px; }
  .l-room-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid;
  }
  .l-room-icon svg { width: 20px; height: 20px; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .l-room.highlighted .l-room-icon { background: #dcfce7; border-color: #86efac; }
  .l-room.highlighted .l-room-icon svg { stroke: #16a34a; }
  .l-room.plain .l-room-icon { background: #f3f4f6; border-color: #d1d5db; }
  .l-room.plain .l-room-icon svg { stroke: #6b7280; }
  .l-room-name { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 2px; }
  .l-room-sub { font-size: 11px; color: #9ca3af; }
  .l-room-rank { font-size: 16px; font-weight: 800; text-align: right; margin-bottom: 1px; }
  .l-room.highlighted .l-room-rank { color: #16a34a; }
  .l-room.plain .l-room-rank { color: #6b7280; }
  .l-room-pts { font-size: 11px; color: #9ca3af; text-align: right; }

  /* Buttons */
  .l-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .l-btn {
    border-radius: 12px; padding: 13px 10px;
    font-size: 13px; font-weight: 700; text-align: center;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    border: 2px solid;
  }
  .l-btn svg { width: 17px; height: 17px; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .l-btn-primary { background: #65a30d; color: #000000; border-color: #4d7c0f; }
  .l-btn-primary svg { stroke: #000000; }
  .l-btn-outline { background: #ffffff; color: #16a34a; border-color: #4ade80; }
  .l-btn-outline svg { stroke: #16a34a; }
</style>

    <!-- Rooms -->

    <div class="l-room highlighted">

            <rect x="17" y="2" width="2" height="7" rx="1"/>

        </div>

</div>
